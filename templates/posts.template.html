<!DOCTYPE html>
<html lang="vi">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>{%title%} | notes.dev</title>
  {%meta%}
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Newsreader:ital,opsz,wght@0,6..72,300;0,6..72,400;0,6..72,500;1,6..72,300;1,6..72,400&family=JetBrains+Mono:wght@400;500&family=DM+Sans:ital,wght@0,300;0,400;0,500;1,300&display=swap" rel="stylesheet">
  <link rel="apple-touch-icon" sizes="180x180" href="/apple-touch-icon.png">
  <link rel="icon" type="image/png" sizes="32x32" href="/favicon-32x32.png">
  <link rel="icon" type="image/png" sizes="16x16" href="/favicon-16x16.png">
  <link href="/css/new-theme.css" rel="stylesheet" type="text/css">
  <script src="/js/highlight.min.js"></script>
  <script src="/js/toc.js"></script>
  <script>hljs.highlightAll();</script>
</head>
<body>

<header>
  <div class="header-inner">
    <a href="/" class="site-name">notes<span>.</span>dev</a>
    <nav>
      <a href="/">Bài viết</a>
      <a href="/rss.xml">RSS</a>
    </nav>
  </div>
</header>

<main>
  <article>
    <div class="post-meta">
      <span class="tag">{%tag_badge%}</span>
      <span class="sep">·</span>
      <span>{%post_date%}</span>
      <span class="sep">·</span>
      <span>{%reading_time%}</span>
    </div>

    <h1 class="post-title">{%title%}</h1>
    {%subtitle%}

    <hr class="post-divider">

    <div class="prose">
      {%content%}
      {%tags%}
    </div>
  </article>

  <aside>
    <div class="toc-label">MỤC LỤC</div>
    {%toc%}
  </aside>
</main>

<footer>
  Viết bằng Rust · Được tạo từ Markdown · © 2026
  <div class="social">
    <a target="_blank" href="https://github.com/dntam00">GitHub</a>
    <a target="_blank" href="https://www.linkedin.com/in/dang-ngoc-tam/">LinkedIn</a>
  </div>
</footer>

<script type="text/javascript" async=""
  src="https://cdnjs.cloudflare.com/ajax/libs/mathjax/2.7.5/MathJax.js?config=TeX-MML-AM_CHTML">
</script>
<script type="text/x-mathjax-config">
  MathJax.Hub.Config({
    tex2jax: {
      inlineMath: [['$','$'], ['\\(','\\)']],
      skipTags: ["script","noscript","style","textarea","code"],
      ignoreClass: ["comment","comment-list"]
    }
  });
</script>

</body>
</html>
